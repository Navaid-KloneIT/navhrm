{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NavHRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4b38b3;
            --primary-dark: #3d2e95;
            --primary-light: #6c5ce7;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4b38b3 0%, #6c5ce7 50%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 460px;
            padding: 15px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo h2 {
            color: var(--primary);
            font-weight: 700;
            font-size: 28px;
            margin: 0;
        }
        .auth-logo p {
            color: #6c757d;
            margin: 5px 0 0;
            font-size: 14px;
        }
        .auth-logo .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(75,56,179,0.1) 0%, rgba(108,92,231,0.15) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        .auth-logo .icon-circle i {
            font-size: 30px;
            color: var(--primary);
        }
        .form-label {
            font-weight: 500;
            color: #344054;
            font-size: 14px;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 16px;
            border: 1.5px solid #d0d5dd;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(75,56,179,0.12);
        }
        .input-group .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f8f9fa;
            border: 1.5px solid #d0d5dd;
            border-right: none;
            color: #6c757d;
        }
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(75,56,179,0.3);
        }
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
            font-size: 14px;
        }
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particles span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        .particles span:nth-child(1) { left: 10%; width: 80px; height: 80px; animation-delay: 0s; animation-duration: 20s; }
        .particles span:nth-child(2) { left: 25%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; }
        .particles span:nth-child(3) { left: 50%; width: 50px; height: 50px; animation-delay: 4s; }
        .particles span:nth-child(4) { left: 75%; width: 60px; height: 60px; animation-delay: 1s; animation-duration: 18s; }
        .particles span:nth-child(5) { left: 85%; width: 25px; height: 25px; animation-delay: 3s; animation-duration: 25s; }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="auth-wrapper" style="position: relative; z-index: 1;">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="icon-circle">
                    <i class="ri-lock-unlock-line"></i>
                </div>
                <h2>Forgot Password?</h2>
                <p>Enter your email to receive a reset link</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'accounts:forgot_password' %}">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="ri-mail-line"></i></span>
                        <input type="email" class="form-control" name="email" placeholder="Enter your registered email" required value="{{ request.POST.email }}">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="ri-mail-send-line me-1"></i> Send Reset Link
                </button>
            </form>

            <div class="text-center auth-links">
                <p class="mb-0" style="font-size:14px; color:#6c757d;">
                    <a href="{% url 'accounts:login' %}"><i class="ri-arrow-left-line me-1"></i>Back to Sign In</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-3">
            <p style="color: rgba(255,255,255,0.7); font-size: 13px;">&copy; 2024 NavHRM. All rights reserved.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
