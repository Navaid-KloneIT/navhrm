{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NavHRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4b38b3;
            --primary-dark: #3d2e95;
            --primary-light: #6c5ce7;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4b38b3 0%, #6c5ce7 50%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px 0;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 520px;
            padding: 15px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo h2 {
            color: var(--primary);
            font-weight: 700;
            font-size: 28px;
            margin: 0;
        }
        .auth-logo p {
            color: #6c757d;
            margin: 5px 0 0;
            font-size: 14px;
        }
        .form-label {
            font-weight: 500;
            color: #344054;
            font-size: 14px;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 16px;
            border: 1.5px solid #d0d5dd;
            font-size: 14px;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(75,56,179,0.12);
        }
        .input-group .input-group-text {
            border-radius: 10px 0 0 10px;
            background: #f8f9fa;
            border: 1.5px solid #d0d5dd;
            border-right: none;
            color: #6c757d;
        }
        .input-group .form-control {
            border-radius: 0 10px 10px 0;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 11px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(75,56,179,0.3);
        }
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .auth-links a:hover {
            text-decoration: underline;
        }
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .alert {
            border-radius: 10px;
            font-size: 14px;
        }
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particles span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        .particles span:nth-child(1) { left: 10%; width: 80px; height: 80px; animation-delay: 0s; animation-duration: 20s; }
        .particles span:nth-child(2) { left: 25%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; }
        .particles span:nth-child(3) { left: 50%; width: 50px; height: 50px; animation-delay: 4s; }
        .particles span:nth-child(4) { left: 75%; width: 60px; height: 60px; animation-delay: 1s; animation-duration: 18s; }
        .particles span:nth-child(5) { left: 85%; width: 25px; height: 25px; animation-delay: 3s; animation-duration: 25s; }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="auth-wrapper" style="position: relative; z-index: 1;">
        <div class="auth-card">
            <div class="auth-logo">
                <h2><i class="ri-shield-user-line"></i> NavHRM</h2>
                <p>Start managing your HR with NavHRM</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'accounts:register' %}">
                {% csrf_token %}

                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label">First Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="ri-user-line"></i></span>
                            <input type="text" class="form-control" name="first_name" placeholder="First name" required value="{{ request.POST.first_name }}">
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Last Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="ri-user-line"></i></span>
                            <input type="text" class="form-control" name="last_name" placeholder="Last name" required value="{{ request.POST.last_name }}">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="ri-mail-line"></i></span>
                        <input type="email" class="form-control" name="email" placeholder="Enter your email address" required value="{{ request.POST.email }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Company / Organization Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="ri-building-line"></i></span>
                        <input type="text" class="form-control" name="company_name" placeholder="Enter your company name" required value="{{ request.POST.company_name }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="ri-at-line"></i></span>
                        <input type="text" class="form-control" name="username" placeholder="Choose a username" required value="{{ request.POST.username }}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="ri-lock-line"></i></span>
                            <input type="password" class="form-control" name="password" placeholder="Create password" required id="passwordInput">
                            <button class="btn btn-outline-secondary border" type="button" style="border-radius: 0 10px 10px 0; border-color: #d0d5dd;" onclick="togglePassword('passwordInput', 'toggleIcon1')">
                                <i class="ri-eye-off-line" id="toggleIcon1"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="ri-lock-line"></i></span>
                            <input type="password" class="form-control" name="confirm_password" placeholder="Confirm password" required id="confirmPasswordInput">
                            <button class="btn btn-outline-secondary border" type="button" style="border-radius: 0 10px 10px 0; border-color: #d0d5dd;" onclick="togglePassword('confirmPasswordInput', 'toggleIcon2')">
                                <i class="ri-eye-off-line" id="toggleIcon2"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="terms" name="terms" required>
                        <label class="form-check-label" for="terms" style="font-size:14px;">
                            I agree to the <a href="#" class="auth-links" style="font-size:14px;">Terms of Service</a> and <a href="#" class="auth-links" style="font-size:14px;">Privacy Policy</a>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="ri-user-add-line me-1"></i> Create Account
                </button>
            </form>

            <div class="text-center auth-links">
                <p class="mb-0" style="font-size:14px; color:#6c757d;">
                    Already have an account? <a href="{% url 'accounts:login' %}">Sign in</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-3">
            <p style="color: rgba(255,255,255,0.7); font-size: 13px;">&copy; 2024 NavHRM. All rights reserved.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ri-eye-line';
            } else {
                input.type = 'password';
                icon.className = 'ri-eye-off-line';
            }
        }
    </script>
</body>
</html>
